name: Deploy GH Pages redirect to recap.latam-tools.com.br

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate redirect site
        run: |
          mkdir -p out
          cat > out/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>Mudamos para RagnaRecap — recap.latam-tools.com.br</title>
            <meta name="robots" content="noindex">
            <link rel="canonical" href="https://recap.latam-tools.com.br/">
            <meta http-equiv="refresh" content="0;url=https://recap.latam-tools.com.br/">
            <style>body{font-family:system-ui;max-width:40em;margin:4em auto;padding:0 1em;line-height:1.5;color:#222}a{color:#ff6f8d}</style>
          </head>
          <body>
            <h1>RagReplayStats agora é RagnaRecap</h1>
            <p>O site foi movido para <a href="https://recap.latam-tools.com.br/">recap.latam-tools.com.br</a>.
               Você será redirecionado automaticamente. Atualize seus favoritos!</p>
            <script>
              location.replace("https://recap.latam-tools.com.br/" + location.search + location.hash);
            </script>
          </body>
          </html>
          HTML
          cp out/index.html out/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
